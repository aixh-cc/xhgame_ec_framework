name: Framework CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.8
      - run: bun install --frozen-lockfile
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
